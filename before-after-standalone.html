<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f2847" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/icons/apple-touch-180.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/images/icons/favicon-48.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
    <title>Before &amp; After — Image comparison slider</title>
    <style>
      :root {
        --accent-navy: #0f2847;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        background: #f1f5f9;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      h1 {
        margin: 0 0 1rem;
        font-size: 1.125rem;
        font-weight: 600;
        color: var(--accent-navy);
      }

      .ba-compare {
        position: relative;
        display: block;
        width: 100%;
        max-width: 56rem;
        touch-action: none;
        border-radius: 1.25rem;
        overflow: hidden;
        aspect-ratio: 16 / 10;
        max-height: min(72vh, 36rem);
        cursor: grab;
        user-select: none;
        -webkit-user-select: none;
        outline: none;
        box-shadow:
          0 20px 50px -20px rgba(15, 40, 71, 0.25),
          0 0 0 1px rgba(148, 163, 184, 0.35);
      }

      .ba-compare:focus-visible {
        box-shadow:
          0 0 0 2px #fff,
          0 0 0 4px #b8923c,
          0 20px 50px -20px rgba(15, 40, 71, 0.25);
      }

      .ba-compare:active {
        cursor: grabbing;
      }

      .ba-compare__img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
        -webkit-user-drag: none;
        user-select: none;
      }

      .ba-compare__before-layer {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        clip-path: inset(0 calc(100% - var(--ba-pos, 50%)) 0 0);
        transition: clip-path 0.18s ease-out;
      }

      .ba-compare.ba-compare--dragging .ba-compare__before-layer {
        transition: none;
      }

      @media (prefers-reduced-motion: reduce) {
        .ba-compare__before-layer {
          transition: none;
        }
      }

      .ba-compare__divider {
        position: absolute;
        top: 0;
        bottom: 0;
        left: var(--ba-pos, 50%);
        z-index: 3;
        width: 3px;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.96);
        pointer-events: none;
        box-shadow: 0 0 14px rgba(15, 40, 71, 0.12);
        transition: left 0.18s ease-out;
      }

      .ba-compare.ba-compare--dragging .ba-compare__divider {
        transition: none;
      }

      @media (prefers-reduced-motion: reduce) {
        .ba-compare__divider {
          transition: none;
        }
      }

      .ba-compare__handle {
        position: absolute;
        top: 50%;
        left: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 9999px;
        background: #fff;
        border: 2px solid rgba(15, 40, 71, 0.1);
        color: var(--accent-navy);
        box-shadow:
          0 4px 22px rgba(15, 40, 71, 0.18),
          0 1px 3px rgba(15, 40, 71, 0.08);
        transform: translate(-50%, -50%);
      }

      .ba-compare__handle-icon {
        width: 1.35rem;
        height: 1.35rem;
      }

      .ba-compare__label {
        position: absolute;
        z-index: 4;
        padding: 0.375rem 0.7rem;
        border-radius: 0.5rem;
        font-size: 0.6875rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        background: rgba(250, 246, 238, 0.94);
        color: var(--accent-navy);
        box-shadow: 0 2px 10px rgba(15, 40, 71, 0.08);
        pointer-events: none;
      }

      .ba-compare__label--before {
        top: 0.75rem;
        left: 0.75rem;
      }

      .ba-compare__label--after {
        bottom: 0.75rem;
        right: 0.75rem;
      }

      .hint {
        margin-top: 0.75rem;
        font-size: 0.8125rem;
        color: #64748b;
        text-align: center;
        max-width: 36rem;
      }
    </style>
  </head>
  <body>
    <h1>Before &amp; after comparison</h1>
    <div
      class="ba-compare"
      id="ba-compare-demo"
      style="--ba-pos: 50%"
      role="img"
      aria-label="Before and after: drag sideways or use arrow keys to compare."
      tabindex="0"
    >
      <img
        class="ba-compare__img"
        src="images/after.jpeg"
        alt="After — finished flooring"
        width="1600"
        height="1000"
        draggable="false"
      />
      <div class="ba-compare__before-layer" aria-hidden="true">
        <img
          class="ba-compare__img"
          src="images/before.jpeg"
          alt=""
          width="1600"
          height="1000"
          draggable="false"
        />
      </div>
      <div class="ba-compare__divider">
        <span class="ba-compare__handle" aria-hidden="true">
          <svg class="ba-compare__handle-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M14 8l4 4-4 4M10 8l-4 4 4 4"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </span>
      </div>
      <span class="ba-compare__label ba-compare__label--before">Before</span>
      <span class="ba-compare__label ba-compare__label--after">After</span>
    </div>
    <p class="hint">Drag on desktop or mobile. Keyboard: focus the image, then ← → (Shift for larger steps).</p>

    <script>
      (function () {
        "use strict";

        var root = document.getElementById("ba-compare-demo");
        if (!root) return;

        function clamp(n, a, b) {
          return Math.max(a, Math.min(b, n));
        }

        function getPct() {
          var raw = getComputedStyle(root).getPropertyValue("--ba-pos").trim();
          var n = parseFloat(raw);
          return Number.isFinite(n) ? clamp(n, 0, 100) : 50;
        }

        function setPct(pct) {
          root.style.setProperty("--ba-pos", clamp(pct, 0, 100).toFixed(2) + "%");
        }

        function pctFromClientX(clientX) {
          var rect = root.getBoundingClientRect();
          if (rect.width <= 0) return 50;
          return ((clientX - rect.left) / rect.width) * 100;
        }

        var activePointerId = null;

        function endDrag(e) {
          if (activePointerId === null) return;
          if (e && e.pointerId !== activePointerId) return;
          activePointerId = null;
          root.classList.remove("ba-compare--dragging");
        }

        root.addEventListener("pointerdown", function (e) {
          if (e.pointerType === "mouse" && e.button !== 0) return;
          activePointerId = e.pointerId;
          root.classList.add("ba-compare--dragging");
          setPct(pctFromClientX(e.clientX));
          try {
            root.setPointerCapture(e.pointerId);
          } catch (_) {}
        });

        root.addEventListener("pointermove", function (e) {
          if (activePointerId === null || e.pointerId !== activePointerId) return;
          setPct(pctFromClientX(e.clientX));
        });

        root.addEventListener("pointerup", endDrag);
        root.addEventListener("pointercancel", endDrag);

        root.addEventListener("lostpointercapture", function () {
          activePointerId = null;
          root.classList.remove("ba-compare--dragging");
        });

        root.addEventListener("keydown", function (e) {
          if (e.key !== "ArrowLeft" && e.key !== "ArrowRight") return;
          e.preventDefault();
          var step = e.shiftKey ? 10 : 3;
          var next = getPct() + (e.key === "ArrowRight" ? step : -step);
          setPct(next);
        });
      })();
    </script>
  </body>
</html>
